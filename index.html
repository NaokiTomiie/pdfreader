<!DOCTYPE html>
<html lang="ja" class="h-full">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>OCR対応 PDF リーダー</title>
    
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.11.174/pdf.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/tesseract.js@5/dist/tesseract.min.js"></script>

    <script>
        tailwind.config = {
            theme: {
                extend: {
                    colors: {
                        primary: '#455A64',
                        primaryLight: '#78909C',
                        primaryDark: '#263238',
                        background: '#ECEFF1',
                        surface: '#FFFFFF',
                        onSurface: '#37474F',
                    },
                    boxShadow: { 'material': '0 2px 2px 0 rgba(0,0,0,0.14), 0 3px 1px -2px rgba(0,0,0,0.12), 0 1px 5px 0 rgba(0,0,0,0.20)' }
                }
            }
        }
    </script>
    
    <style>
        .textLayer { position: absolute; left: 0; top: 0; right: 0; bottom: 0; pointer-events: none; z-index: 10; }
        .textLayer > span { position: absolute; cursor: pointer; border-radius: 3px; pointer-events: auto; background-color: rgba(255, 255, 255, 0.01); }
        .textLayer > span:hover { background-color: rgba(69, 90, 100, 0.3) !important; }
    </style>
</head>
<body class="bg-background text-onSurface font-sans h-full flex flex-col overflow-hidden">

    <header class="bg-primary text-white shadow-material py-3 px-6 flex justify-between items-center z-20 shrink-0">
        <h1 class="text-lg font-medium">OCR対応 PDF リーダー</h1>
        <div class="flex items-center gap-4">
            <button id="stop-btn" class="hidden bg-red-600 text-white px-4 py-2 rounded shadow-material hover:bg-red-700 transition-all text-sm font-medium">読み上げ停止</button>
            <input type="file" id="file-input" accept="application/pdf" class="hidden">
            <label for="file-input" class="cursor-pointer bg-surface text-primary px-4 py-2 rounded shadow-material hover:bg-gray-100 transition-all font-medium text-sm">PDFを開く</label>
        </div>
    </header>

    <main class="flex-grow flex flex-col items-center p-2 gap-2 overflow-hidden">
        <div id="controls" class="hidden flex flex-wrap gap-4 items-center bg-surface px-4 py-2 rounded shadow-material">
            <button id="prev" class="bg-background hover:bg-gray-200 px-3 py-1 rounded transition-colors">前へ</button>
            <span id="page-info" class="text-sm font-medium w-20 text-center">1 / 1</span>
            <button id="next" class="bg-background hover:bg-gray-200 px-3 py-1 rounded transition-colors">次へ</button>
            <div class="flex items-center gap-2 text-sm border-l pl-4 border-gray-200">
                <span>縮小</span>
                <input type="range" id="scale-slider" min="0.5" max="3.0" step="0.1" value="1.5" class="accent-primary">
                <span>拡大</span>
            </div>
        </div>
        
        <div id="status" class="text-xs text-primary font-medium"></div>
        
        <div id="viewer-container" class="hidden flex-grow relative bg-white shadow-material rounded-lg overflow-auto w-full flex justify-center items-start">
            <div id="canvas-wrapper" class="relative">
                <canvas id="pdf-canvas"></canvas>
                <div id="text-layer" class="textLayer"></div>
            </div>
        </div>
    </main>

    <script>
        pdfjsLib.GlobalWorkerOptions.workerSrc = 'https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.11.174/pdf.worker.min.js';
        let pdfDoc = null, pageNum = 1;
        const canvas = document.getElementById('pdf-canvas'), ctx = canvas.getContext('2d');
        const textLayer = document.getElementById('text-layer'), statusDiv = document.getElementById('status');
        const container = document.getElementById('viewer-container');
        const stopBtn = document.getElementById('stop-btn');
        const scaleSlider = document.getElementById('scale-slider');

        async function renderPage(num) {
            statusDiv.textContent = `ページ ${num} をレンダリング中...`;
            const page = await pdfDoc.getPage(num);
            const scale = parseFloat(scaleSlider.value);
            
            const viewport = page.getViewport({ scale: scale });
            canvas.height = viewport.height;
            canvas.width = viewport.width;
            await page.render({ canvasContext: ctx, viewport: viewport }).promise;

            statusDiv.textContent = "OCR文字認識中...";
            const dataUrl = canvas.toDataURL('image/jpeg');
            const { data: { lines } } = await Tesseract.recognize(dataUrl, 'jpn');

            textLayer.innerHTML = '';
            lines.forEach(line => {
                const span = document.createElement('span');
                const bbox = line.bbox;
                span.style.left = bbox.x0 + 'px';
                span.style.top = bbox.y0 + 'px';
                span.style.width = (bbox.x1 - bbox.x0) + 'px';
                span.style.height = (bbox.y1 - bbox.y0) + 'px';
                
                span.onclick = (e) => {
                    e.stopPropagation();
                    window.speechSynthesis.cancel();
                    const utterance = new SpeechSynthesisUtterance(line.text);
                    utterance.lang = 'ja-JP';
                    utterance.onstart = () => stopBtn.classList.remove('hidden');
                    utterance.onend = () => stopBtn.classList.add('hidden');
                    window.speechSynthesis.speak(utterance);
                };
                textLayer.appendChild(span);
            });
            statusDiv.textContent = `ページ ${num} 完了`;
            document.getElementById('page-info').textContent = `${pageNum} / ${pdfDoc.numPages}`;
        }

        stopBtn.onclick = () => {
            window.speechSynthesis.cancel();
            stopBtn.classList.add('hidden');
        };

        scaleSlider.addEventListener('input', () => {
            if (pdfDoc) renderPage(pageNum);
        });

        document.getElementById('file-input').addEventListener('change', async (e) => {
            const file = e.target.files[0];
            if(!file) return;
            const pdf = await pdfjsLib.getDocument(await file.arrayBuffer()).promise;
            pdfDoc = pdf;
            container.classList.remove('hidden');
            document.getElementById('controls').classList.remove('hidden');
            renderPage(pageNum);
        });

        document.getElementById('prev').onclick = () => { if(pageNum > 1) renderPage(--pageNum); };
        document.getElementById('next').onclick = () => { if(pageNum < pdfDoc.numPages) renderPage(++pageNum); };
    </script>
</body>
</html>
